<!DOCTYPE html>  
<html lang="en">  
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniX</title>
<link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #ffffff;
        --accent: #00f3ff;
        --bg-deep: #050505;
        --glass: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glow: 0 0 20px rgba(0, 243, 255, 0.3);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0; padding: 0;
        font-family: 'Poppins', sans-serif;
        background-color: var(--bg-deep);
        color: white;
        overflow-x: hidden;
        min-height: 100vh;
    }

    #snow-canvas {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        background: radial-gradient(circle at 50% 10%, #1a1f25, #000000);
    }

    .container {
        max-width: 1600px;
        margin: 0 auto;
        padding: 40px 20px;
        position: relative;
        z-index: 10;
    }

    header {
        text-align: center;
        margin-bottom: 40px;
        padding-top: 40px;
        animation: slideDown 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 4.5rem;
        font-weight: 900;
        margin: 0;
        letter-spacing: 4px;
        color: white;
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
    }

    .subtitle {
        margin-top: 10px;
        font-size: 1.5rem;
        color: var(--accent);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 15px var(--accent);
        transition: 0.3s ease;
    }

    .game-count {
        margin-top: 8px;
        font-size: 0.9rem;
        color: rgba(255,255,255,0.4);
        letter-spacing: 1px;
    }

    .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        margin-bottom: 50px;
        margin-top: 20px;
    }

    #searchBar {
        width: 100%;
        max-width: 600px;
        padding: 18px 30px;
        border-radius: 50px;
        border: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 1.2rem;
        font-family: 'Poppins', sans-serif;
        backdrop-filter: blur(15px);
        transition: all 0.3s ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #searchBar:focus {
        border-color: var(--accent);
        background: rgba(0, 0, 0, 0.8);
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        outline: none;
        transform: scale(1.02);
    }

    .category-tabs {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        max-width: 900px;
    }

    .tab {
        padding: 8px 20px;
        border-radius: 50px;
        border: 1px solid var(--glass-border);
        background: var(--glass);
        color: rgba(255,255,255,0.6);
        font-family: 'Poppins', sans-serif;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s ease;
        backdrop-filter: blur(10px);
    }

    .tab:hover, .tab.active {
        border-color: var(--accent);
        color: var(--accent);
        box-shadow: 0 0 12px rgba(0, 243, 255, 0.2);
        background: rgba(0, 243, 255, 0.08);
    }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 25px;
        animation: fadeIn 0.5s ease;
    }

    .card {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 18px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
        backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        transform: translateY(0);
    }

    .card:hover {
        transform: translateY(-10px) scale(1.02);
        border-color: #fff;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.15);
    }

    .card-thumb-container {
        width: 100%;
        height: 140px; 
        overflow: hidden;
        background: #000;
        position: relative;
    }
    
    .card-thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .card:hover .card-thumb {
        transform: scale(1.1);
    }

    .card-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        background: var(--accent);
        color: #000;
        font-size: 0.6rem;
        font-weight: 800;
        padding: 2px 8px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .card-info {
        padding: 15px;
        text-align: center;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        margin-top: auto;
    }

    .card-title {
        font-weight: 700;
        font-size: 1rem;
        color: #fff;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .card-category {
        font-size: 0.7rem;
        color: var(--accent);
        margin-top: 3px;
        opacity: 0.7;
    }

    .section-label {
        grid-column: 1 / -1;
        font-family: 'Orbitron', sans-serif;
        font-size: 1rem;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 3px;
        padding: 10px 0 5px;
        border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        margin-top: 10px;
    }

    .footer {
        text-align: center;
        margin-top: 80px;
        padding-bottom: 40px;
        color: #666;
        font-size: 0.9rem;
    }

    .footer b { color: var(--accent); }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-40px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
</style>
</head>

</div>

    const gameGrid = document.getElementById('game-grid');
    const countEl = document.getElementById('game-count');
    const visibleEl = document.getElementById('visible-count');

    countEl.textContent = `${games.length} Games Available`;

    // Build category list
    const cats = ['All', ...new Set(games.map(g => g.cat))].sort((a, b) => a === 'All' ? -1 : b === 'All' ? 1 : a.localeCompare(b));
    const tabContainer = document.getElementById('category-tabs');
    let activeCategory = 'All';

    cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = cat;
            filterItems();
        };
        tabContainer.appendChild(btn);
    });

    // Render all cards
    games.forEach(game => gameGrid.appendChild(createCard(game)));
    updateCount();

    function createCard(item) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.name = item.name.toLowerCase();
        card.dataset.cat = item.cat;
        card.onclick = () => launch(item.url, item.name);

        const searchQuery = encodeURIComponent(item.name + " game icon");
        const imgUrl = `https://tse2.mm.bing.net/th?q=${searchQuery}&w=400&h=300&c=7&rs=1&p=0`;
        const fallbackUrl = `https://placehold.co/400x300/111/00f3ff?text=${encodeURIComponent(item.name)}`;

        card.innerHTML = `
            <div class="card-thumb-container">
                ${item.isNew ? '<span class="card-badge">New</span>' : ''}
                <img src="${imgUrl}" class="card-thumb" onerror="this.src='${fallbackUrl}'" loading="lazy" alt="${item.name}">
            </div>
            <div class="card-info">
                <div class="card-title">${item.name}</div>
                <div class="card-category">${item.cat}</div>
            </div>
        `;
        return card;
    }

    function launch(url, name) {
        const win = window.open('about:blank', '_blank');
        if (!win) { alert("Pop-ups are blocked! Please allow pop-ups for this site."); return; }
        
        const html = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Google Drive</title>
                <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">
                <style>
                    body { margin:0; padding:0; height:100vh; background:#000; overflow:hidden; }
                    iframe { width:100%; height:100%; border:none; display:block; }
                </style>
            </head>
            <body>
                <iframe src="${url}" allowfullscreen allow="autoplay; fullscreen"></iframe>
                <script>
                    window.addEventListener('keydown', (e) => {
                        if (e.key === "Escape") window.location.replace("https://drive.google.com");
                    });
                <\/script>
            </body>
            </html>
        `;
        win.document.write(html);
        win.document.close();
    }

    function filterItems() {
        const input = document.getElementById('searchBar').value.toLowerCase();
        const cards = gameGrid.getElementsByClassName('card');
        let shown = 0;
        for (let i = 0; i < cards.length; i++) {
            const nameMatch = cards[i].dataset.name.includes(input);
            const catMatch = activeCategory === 'All' || cards[i].dataset.cat === activeCategory;
            const visible = nameMatch && catMatch;
            cards[i].style.display = visible ? "flex" : "none";
            if (visible) shown++;
        }
        updateCount(shown);
    }

    function updateCount(shown) {
        const total = games.length;
        const s = shown !== undefined ? shown : total;
        visibleEl.textContent = `${s} of ${total}`;
    }

    // Snow canvas
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, flakes = [];

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Flake {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * width;
            this.y = Math.random() * -height;
            this.size = Math.random() * 3 + 1;
            this.speed = Math.random() * 1 + 0.5;
            this.opacity = Math.random() * 0.5 + 0.3;
            this.swayOffset = Math.random() * Math.PI * 2;
        }
        update() {
            this.y += this.speed;
            this.x += Math.sin(this.y * 0.01 + this.swayOffset) * 0.5 + 0.2;
            if (this.y > height) { this.init(); this.y = 0; }
            if (this.x > width) this.x = 0;
            if (this.x < 0) this.x = width;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 150; i++) flakes.push(new Flake());

    function animate() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < flakes.length; i++) { flakes[i].update(); flakes[i].draw(); }
        requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('keydown', (e) => {
        if(e.key === "Escape") window.location.replace("https://drive.google.com");
    });
</script>
